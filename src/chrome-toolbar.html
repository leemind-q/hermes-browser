<!-- ==========================================================================
   Hermes Browser — Chrome Toolbar HTML (Replacement)
   ==========================================================================
   Replace the <body> content starting from the Spaces Switcher
   down to the end of .topbar with the markup below.

   Key changes from V23:
   1. Space switcher → 42px bar, equal-width pills, thin bottom indicator
   2. No big orange button on space pills (only subtle text indicator)
   3. Address bar icons 17px, click area 34px (within 32-36 range)
   4. Address bar fills center, page pill minimized
   5. Divider between toolbar and webview (CSS managed)
   ========================================================================== -->

<!-- V25: Spaces Switcher (compact 42px bar) -->
<div id="v23SpaceSwitcher" aria-label="Spaces / Profiles Switcher">
  <button class="v23-space-pill active" data-space="work" data-tooltip="회사 업무 / 회로 일">
    <span class="icon">💼</span>
    <span class="label">업무</span>
  </button>
  <button class="v23-space-pill" data-space="personal" data-tooltip="개인 브라우징">
    <span class="icon">🌿</span>
    <span class="label">개인</span>
  </button>
  <button class="v23-space-pill" data-space="development" data-tooltip="Hermes 개발 / GitHub">
    <span class="icon">⚡</span>
    <span class="label">개발</span>
  </button>
</div>

<!-- Toolbar (50px) — nav + address + actions -->
<div class="topbar">
  <!-- macOS-style window controls -->
  <div class="traffic">
    <button class="dot red" id="winClose" title="닫기"></button>
    <button class="dot yellow" id="winMin" title="최소화"></button>
    <button class="dot green" id="winMax" title="최대화"></button>
  </div>

  <!-- Navigation group -->
  <div class="nav-group">
    <button class="icon-btn" id="backBtn" title="뒤로">
      <svg class="ui-icon"><use href="#i-back"></use></svg>
    </button>
    <button class="icon-btn" id="forwardBtn" title="앞으로">
      <svg class="ui-icon"><use href="#i-forward"></use></svg>
    </button>
    <button class="icon-btn" id="reloadBtn" title="새로고침">
      <svg class="ui-icon"><use href="#i-refresh"></use></svg>
    </button>
  </div>

  <!-- Address bar (takes remaining space) -->
  <div class="address">
    <input id="addressInput" placeholder="URL 또는 자연어 검색" spellcheck="false" />
    <span id="pagePill" title="페이지 상태">대기</span>
  </div>

  <!-- Tool group (find + favorite) -->
  <div class="tool-group">
    <button class="basics-btn" id="findBtn" title="페이지 내 검색 (Ctrl+F)">
      <svg class="ui-icon"><use href="#i-search"></use></svg>
    </button>
    <button class="basics-btn" id="favoriteBtn" title="즐겨찾기 (Ctrl+D)">
      <svg class="ui-icon"><use href="#i-star"></use></svg>
    </button>
  </div>

  <!-- Top actions (new tab + settings) -->
  <div class="top-actions">
    <button class="icon-btn" id="newTabTopBtn" title="새 탭">
      <svg class="ui-icon"><use href="#i-plus"></use></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" title="설정" aria-expanded="false" aria-controls="settingsPopover">
      <svg class="ui-icon"><use href="#i-settings"></use></svg>
    </button>
  </div>
</div>
