<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hermes Cowork Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9f9fb;
      color: #1a1a2e;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(20, 30, 50, 0.08);
      margin-bottom: 12px;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 100px;
    }
    .status.connected {
      background: #d1fae5;
      color: #047857;
    }
    .status.disconnected {
      background: #fee2e2;
      color: #b91c1c;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .section {
      margin-bottom: 14px;
    }
    .section h2 {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b6b80;
      margin-bottom: 6px;
    }
    .quick-action {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(20, 30, 50, 0.08);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #1a1a2e;
      transition: all 200ms;
      margin-bottom: 4px;
    }
    .quick-action:hover {
      border-color: #fbbf24;
      background: #fffbeb;
    }
    .quick-action .icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }
    .quick-action .label {
      flex: 1;
      text-align: left;
    }
    .quick-action .hint {
      font-size: 9px;
      color: #6b6b80;
    }
    .footer {
      padding-top: 8px;
      border-top: 1px solid rgba(20, 30, 50, 0.08);
      font-size: 10px;
      color: #6b6b80;
      text-align: center;
    }
    .result {
      max-height: 200px;
      overflow-y: auto;
      background: #1a1a2e;
      color: #e8e8ee;
      padding: 10px;
      border-radius: 6px;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 10px;
      line-height: 1.5;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">H</div>
    <h1>Hermes Cowork Bridge</h1>
    <span class="status disconnected" id="status">
      <span class="status-dot"></span>
      <span id="statusText">연결 확인 중...</span>
    </span>
  </div>

  <div class="section">
    <h2>빠른 cowork 도구</h2>
    <button class="quick-action" data-action="cowork_list">
      <span class="icon">📂</span>
      <span class="label">워크스페이스 목록</span>
      <span class="hint">cowork_list</span>
    </button>
    <button class="quick-action" data-action="cowork_git_status">
      <span class="icon">🔧</span>
      <span class="label">Git 상태</span>
      <span class="hint">cowork_git_status</span>
    </button>
    <button class="quick-action" data-action="cowork_watch_list">
      <span class="icon">📡</span>
      <span class="label">활성 워처 목록</span>
      <span class="hint">cowork_watch_list</span>
    </button>
    <button class="quick-action" data-action="cowork_list_locks">
      <span class="icon">🔒</span>
      <span class="label">활성 락 목록</span>
      <span class="hint">cowork_list_locks</span>
    </button>
  </div>

  <div class="result" id="result" style="display:none;"></div>

  <div class="footer">
    Hermes Browser V18 · AGPL-3
  </div>

  <script src="popup.js"></script>
</body>
</html>
