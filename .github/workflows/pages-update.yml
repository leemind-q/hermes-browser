name: Update Pages with V14/V15/V20 content

on:
  push:
    branches: [main]
    paths: ['docs/**', 'README.md', '.github/workflows/pages-update.yml']
  workflow_dispatch: {}

permissions:
  contents: write  # needed for gh-pages branch push

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject V14/V15/V20 release info
        id: meta
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          COMMITS=$(git rev-list --count HEAD)
          echo "commits=${COMMITS}" >> $GITHUB_OUTPUT
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          sed -i "s|version: 'v[0-9]*'|version: 'v20.${COMMITS}'|g" docs/index.html || true
          sed -i "s|Last updated [0-9-]*|Last updated ${TODAY}|g" docs/index.html || true
          echo "Updated with commits=${COMMITS}, date=${TODAY}"

      - name: Show updated index.html (first 30 lines)
        run: head -30 docs/index.html

      - name: Configure git
        run: |
          git config user.email "[email protected]"
          git config user.name "Hermes Bot"

      - name: Push to gh-pages branch
        run: |
          git checkout -b gh-pages 2>/dev/null || git checkout gh-pages
          find . -mindepth 1 -not -path './.git*' -delete 2>/dev/null || true
          git checkout main -- docs/ || true
          if [ -d docs ]; then
            cp -r docs/* .
            rm -rf docs
          fi
          echo "leemind-q.github.io" > CNAME
          git add -A
          git diff --cached --quiet || git commit -m "V20 Pages deploy: $(date -u +%FT%TZ) [skip ci]"
          git push -f origin gh-pages || (echo "Push failed, trying push with upstream" && git push -u origin gh-pages --force)
          echo "gh-pages pushed"

      - name: Verify Pages deploy
        run: |
          echo "=== Pages stats check ==="
          echo "Files deployed: $(git ls-tree -r --name-only gh-pages | wc -l)"
          echo "Screenshots: $(git ls-tree -r --name-only gh-pages docs/screenshots/ 2>/dev/null | grep -c .png || echo 0)"
          echo ""
          echo "=== Tools count (from manifest) ==="
          # Pull from main and count MCP tools
          git checkout main --
          if [ -f src/mcp-bridge.js ]; then
            TOTAL=$(grep -c "{ name: '" src/mcp-bridge.js)
            COWORK=$(grep -c "{ name: 'cowork_" src/mcp-bridge.js)
            echo "Total MCP tools: $TOTAL"
            echo "Cowork tools: $COWORK"
          fi
          git checkout gh-pages --