name: Update Pages with V12/V13 content

on:
  push:
    branches: [main]
    paths: ['docs/index.html', 'README.md', '.github/workflows/pages-update.yml']
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Inject V13 release info
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          COMMITS=$(git rev-list --count HEAD)
          sed -i "s|version: 'v12'|version: 'v${COMMITS}'|" docs/index.html || true
          sed -i "s|Last updated [0-9-]*|Last updated ${TODAY}|g" docs/index.html || true
          echo "Updated with commits=${COMMITS}, date=${TODAY}"

      - name: Show updated index.html (first 30 lines)
        run: head -30 docs/index.html

      - name: Commit to gh-pages branch
        run: |
          git config user.email "actions@hermes-browser.local"
          git config user.name "Hermes Bot"
          git checkout --orphan gh-pages --force
          git rm -rf . 2>/dev/null || true
          cp -r docs/* .
          echo "leemind-q.github.io" > CNAME
          git add -A
          git commit -m "V12/V13 Pages deploy: $(date -u +%FT%TZ)" --allow-empty
          git push -f origin gh-pages || echo "gh-pages push failed (may need manual setup)"
