name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: Node.js Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run unit tests
        run: npm test -- --ignore-scripts 2>&1 | head -200
        continue-on-error: false

      - name: Verify cross-platform coworker path handling
        run: |
          echo "=== Cross-platform path validation ==="
          node tests/cowork.test.js
          echo "=== Cowork test passed ==="

      - name: Verify eval scenarios
        run: |
          echo "=== Eval runner ==="
          node eval/runner.js 2>&1 | head -100
          echo "=== Eval done ==="
        continue-on-error: true
